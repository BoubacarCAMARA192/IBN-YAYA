services:
  - type: web
    name: tribute-yaya-camara
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DB_PATH
        value: /data/tribute.db
      - key: UPLOADS_PATH
        value: /data/uploads
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
